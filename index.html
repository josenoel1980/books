async function loadStates(userId) {
  const { data, error } = await supabase.from('book_states').select('*').eq('user_id', userId);
  if (error) { console.error('loadStates:', error); return {}; }
  const map = {};
  (data || []).forEach(r => { map[r.book_id] = r; });
  return map;
}

async function saveState(userId, bookId, read, wishlist, rating, extraData) {
  const { error } = await supabase.from('book_states').upsert({
    user_id: userId,
    book_id: String(bookId),
    read: read || false,
    wishlist: wishlist || false,
    rating: rating || 0,
    extra_data: extraData || null,
    updated_at: new Date().toISOString()
  }, { onConflict: 'user_id,book_id' });
  if (error) console.error('saveState error:', error.message);
}

async function deleteState(userId, bookId) {
  await supabase.from('book_states').delete().eq('user_id', userId).eq('book_id', String(bookId));
}

function getApiKey() { return window._claudeApiKey || localStorage.getItem('claude_api_key') || ''; }

async function callClaude(prompt, maxTokens = 1000) {
  const apiKey = getApiKey();
  const headers = { "Content-Type": "application/json" };
  if (apiKey) {
    headers["x-api-key"] = apiKey;
    headers["anthropic-version"] = "2023-06-01";
    headers["anthropic-dangerous-direct-browser-access"] = "true";
  }
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers,
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: maxTokens,
      messages: [{ role: "user", content: prompt }]
    })
  });
  const rawText = await response.text();
  let data;
  try { data = JSON.parse(rawText); }
  catch(e) { throw new Error("Status " + response.status + ": " + rawText.slice(0,150)); }
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  if (!data.content) throw new Error("No content field. Got: " + Object.keys(data).join(", "));
  return data.content.map(b => b.text || "").join("").trim();
}

// Get series name from book tags
function getSeriesName(book) {
  if (book.standalone) return null;
  const tags = book.tags || [];
  // Find all character names in tags
  const chars = tags.filter(t => CHARACTER_NAMES.has(t));
  if (chars.length > 1) return chars.slice(0,2).join(' & '); // e.g. "Bosch & Ballard"
  if (chars.length === 1) return chars[0];
  // If first tag is not a generic word, use it as series name
  const genericTags = new Set(['LAPD','CIA','FBI','Crime','Action','Thriller','Standalone',
    'Legal','Mystery','Spy','Historical','Serial Killer','Cold Case','Political',
    'Netflix','Drugs','Terrorism','Journalist','Military','Navy SEAL','Assassination',
    'Corruption','Conspiracy','Washington','Russia','Pakistan','Israel','Middle East',
    'NGO','Medical','Finance','Police','Detective','Psychological','Suspense',
    'Heist','Prison','Insurance','Classic','Foreclosure','Hong Kong','Tech',
    'Bioweapon','Sniper','Africa','India','Investment','Edgar Award','WWII','Noir',
    'Black Market','Bangladesh','Bollywood']);
  if (tags[0] && !genericTags.has(tags[0]) && tags[0] !== 'Standalone') return tags[0];
  return null;
}

function CountdownTimer({ nextRefresh }) {
  const [t,setT]=useState("");
  useEffect(()=>{
    const upd=()=>{const d=nextRefresh-new Date();if(d<=0){setT("Refreshing…");return;}setT(Math.floor(d/3600000)+"h "+Math.floor((d%3600000)/60000)+"m");};
    upd();const id=setInterval(upd,60000);return()=>clearInterval(id);
  },[nextRefresh]);
  return React.createElement('span', null, t);
}
